<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__REPORT_TITLE__</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #24292f;
            --muted: #57606a;
            --border: #d0d7de;
            --card: #f6f8fa;
            --accent: #0969da;
            --ok: #1a7f37;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .meta {
            flex: 1;
            min-width: 0;
        }
        .meta h1 {
            margin: 0;
            font-size: 20px;
            line-height: 1.3;
        }
        .meta p {
            margin: 6px 0 0;
            color: var(--muted);
        }
        .link-row {
            display: flex;
            align-items: center;
            gap: 16px;
            white-space: nowrap;
        }
        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            color: var(--ok);
            text-decoration: underline;
        }
        .viewer {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--card);
            min-height: calc(100vh - 140px);
        }
        .viewer iframe {
            display: block;
            width: 100%;
            min-height: calc(100vh - 140px);
            border: 0;
            background: #fff;
        }
        @media (max-width: 900px) {
            .wrap {
                padding: 16px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .link-row {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <div class="meta">
                <h1>__REPORT_TITLE__</h1>
                <p>__REPORT_SUBTITLE__</p>
            </div>
            <div class="link-row">
                <a href="/">返回报告列表</a>
                <a href="/reports/raw/__REPORT_FILE_NAME__" target="_blank" rel="noopener">打开原始报告</a>
            </div>
        </div>
        <div class="viewer">
            <iframe src="/reports/raw/__REPORT_FILE_NAME__" title="Drun 报告详情" loading="lazy"></iframe>
        </div>
    </div>
</body>
</html>
